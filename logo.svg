<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <defs>
        <linearGradient id="spiralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#003087"/>
            <stop offset="100%" stop-color="#e31837"/>
        </linearGradient>
    </defs>
    
    <!-- Background circle -->
    <circle cx="100" cy="100" r="90" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    
    <!-- Spiral Jetty inspired spiral -->
    <path d="M100,100 
             a80,80 0 0,1 80,80
             a60,60 0 0,1 -60,60
             a40,40 0 0,1 -40,40
             a20,20 0 0,1 -20,20
             a10,10 0 0,1 -10,10
             a5,5 0 0,1 -5,5
             a2.5,2.5 0 0,1 -2.5,2.5"
          fill="none" 
          stroke="url(#spiralGradient)" 
          stroke-width="6" 
          stroke-linecap="round"
          transform="rotate(-90 100 100) translate(-100 -100)"/>
    
    <!-- Earth dot -->
    <circle cx="100" cy="100" r="12" fill="#003087" stroke="#fff" stroke-width="2"/>
    
    <!-- Title text -->
    <text x="100" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#003087">
        PROTEAN.EARTH
    </text>
</svg>
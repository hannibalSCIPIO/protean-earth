<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout – Protean Earth</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        .form-group small { display: block; margin-top: 0.25rem; color: #666; }
    </style>
</head>
<body>
    <div class="banner">Free shipping on orders $30+</div>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo"><img src="logo.svg" alt="Protean Earth" class="logo-img" /><span>Protean Earth</span></a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Checkout</h1>
            <p>Complete your order securely with Stripe.</p>
        </div>
    </section>

    <section class="container" style="margin-top: 2rem;">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <form id="checkout-form">
                <div class="form-group">
                    <label for="product">Select Magnet Pack</label>
                    <select id="product" name="product" required>
                        <option value="6pack">6-Pack – $30</option>
                        <option value="12pack">12-Pack – $50</option>
                        <option value="single">Single Magnet – $12</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="phone">Your Phone Number (reference)</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. 3035551234" required pattern="[0-9]{10,}" title="Enter your phone number (digits only, no dashes)" />
                    <small>This will be your reference number. We'll also use it to match your payment.</small>
                </div>

                <div class="form-group">
                    <label for="email">Email (for receipt)</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required />
                </div>

                <button type="submit" class="button" id="pay-btn">Pay with Card</button>
            </form>
            <div id="message" style="margin-top: 1rem;"></div>
        </div>
    </section>

    <footer class="site-header">
        <div class="container">
            <p>&copy; 2026 Protean Earth. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Pre‑select product from query parameter (e.g. ?product=square)
        const params = new URLSearchParams(window.location.search);
        const productParam = params.get('product');
        if (productParam) {
            const select = document.getElementById('product');
            Array.from(select.options).some(opt => {
                if (opt.value === productParam) {
                    select.value = productParam;
                    return true;
                }
            });
        }

        const form = document.getElementById('checkout-form');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const productId = document.getElementById('product').value;
            const phone = document.getElementById('phone').value.replace(/\D/g, ''); // strip non-digits
            const email = document.getElementById('email').value;

            const payBtn = document.getElementById('pay-btn');
            payBtn.disabled = true;
            payBtn.textContent = 'Processing...';

            try {
                const response = await fetch('/api/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, phone, email })
                });
                const data = await response.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    messageDiv.innerHTML = '<p style="color:red;">Error: ' + (data.error || 'Something went wrong') + '</p>';
                    payBtn.disabled = false;
                    payBtn.textContent = 'Pay with Card';
                }
            } catch (err) {
                messageDiv.innerHTML = '<p style="color:red;">Network error. Please try again.</p>';
                payBtn.disabled = false;
                payBtn.textContent = 'Pay with Card';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout – Protean Earth</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf9f7; }
        .banner { background: #1a1a1a; color: #c9a962; text-align: center; padding: 0.75rem; font-size: 0.85rem; }
        .express-banner { background: #c9a962; color: #1a1a1a; text-align: center; padding: 0.5rem; font-size: 0.8rem; font-weight: 600; }
        
        header { background: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: #1a1a1a; text-decoration: none; }
        nav a { color: #666; text-decoration: none; margin-left: 2rem; }
        nav a:hover { color: #c9a962; }
        
        .hero { background: linear-gradient(135deg, #1a3a3a 0%, #0d1f1f 100%); color: #fff; text-align: center; padding: 2rem; }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; }
        
        .checkout { max-width: 500px; margin: 2rem auto; padding: 2rem; background: #fff; border: 1px solid #eee; }
        
        .order-summary {
            background: #f5f4f2;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .order-summary .product { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .order-summary .details { color: #666; font-size: 0.9rem; }
        .order-summary .total { font-size: 1.5rem; font-weight: 700; color: #c9a962; margin-top: 0.5rem; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.75rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 8px; }
        
        .delivery-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delivery-option:hover { border-color: #c9a962; }
        .delivery-option.selected { border-color: #c9a962; background: #f0f7ff; }
        .delivery-option input { width: auto; }
        
        .payment-btn { display: block; width: 100%; padding: 1rem; margin: 0.75rem 0; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .venmo { background: #008CFF; color: white; }
        .cashapp { background: #FFDC00; color: black; }
        .stripe { background: #635BFF; color: white; }
        .payment-btn:hover { opacity: 0.9; }
        
        footer { background: #1a1a1a; color: rgba(255,255,255,0.6); text-align: center; padding: 2rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="banner">Free shipping on orders of 6+ magnets or $30+</div>
    <div class="express-banner">🚀 Express Local Delivery: 1hr within 1.5mi of 10001 S State St, Sandy (Fri-Sun 6pm-11pm)</div>
    
    <header>
        <a href="index.html" class="logo">PROTEAN EARTH</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Checkout</h1>
    </section>

    <section class="checkout">
        <div class="order-summary" id="summary">
            <!-- Filled by JS -->
        </div>
        
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Your name" />
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="3035551234" />
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" />
        </div>
        
        <div class="form-group">
            <label>Delivery Method</label>
            <label class="delivery-option">
                <input type="radio" name="delivery" value="ship" checked onchange="updateDelivery()">
                <div>
                    <strong>Ship to me</strong>
                    <div style="font-size: 0.85rem; color: #666;">Free on 6+ magnets</div>
                </div>
            </label>
            <label class="delivery-option" id="expressOption" style="display: none;">
                <input type="radio" name="delivery" value="express" onchange="updateDelivery()">
                <div>
                    <strong>Express Local Delivery</strong>
                    <div style="font-size: 0.85rem; color: #666;">1hr delivery, Fri-Sun 6-11pm</div>
                </div>
            </label>
        </div>
        
        <button type="button" class="payment-btn venmo" onclick="payWith('venmo')">📱 Pay with Venmo</button>
        <button type="button" class="payment-btn cashapp" onclick="payWith('cashapp')">💵 Pay with CashApp</button>
        <button type="button" class="payment-btn stripe" onclick="payWith('stripe')">💳 Pay with Card</button>
    </section>

    <footer>
        <p>© 2026 Protean Earth. All rights reserved.</p>
    </footer>

    <script>
        const VENMO_USERNAME = 'sunnydandee';
        const CASHAPP_TAG = '$proteanEARTH';
        
        const STRIPE_LINKS = {
            'square-1': 'https://buy.stripe.com/test_7sY28qh0ReTw7lfeLRes003',
            'square-6': 'https://buy.stripe.com/test_5kQ14mh0R26K20V7jpes007',
            'square-12': 'https://buy.stripe.com/test_dRmeVccKB26KcFz5bhes00a',
            'square-24': 'https://buy.stripe.com/test_9B614m8ul3aOeNHfPVes00c',
            'rect-1': 'https://buy.stripe.com/test_28E28q11T5iWdJD1Z5es004',
            'rect-6': 'https://buy.stripe.com/test_9B67sK8ul4eSaxr47des008',
            'rect-12': 'https://buy.stripe.com/test_cNi28qeSJ9zccFz9rxes00b',
            'rect-24': 'https://buy.stripe.com/test_9B614m8ul3aOeNHfPVes00c'
        };
        
        let order = { size: 'square', qty: 1, price: 4 };
        
        function init() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('size')) order.size = params.get('size');
            if (params.get('qty')) order.qty = parseInt(params.get('qty'));
            if (params.get('price')) order.price = parseInt(params.get('price'));
            
            const sizeLabel = order.size === 'square' ? 'Square (2.5" × 2.5")' : 'Rectangle (2.5" × 3.5")';
            const shipping = order.qty >= 6 ? 'FREE' : '$5';
            
            document.getElementById('summary').innerHTML = `
                <div class="product">${order.qty} ${sizeLabel} Magnets</div>
                <div class="details">${order.qty} magnets @ $${Math.round(order.price/order.qty)} each</div>
                <div class="total">Total: $${order.price}</div>
            `;
            
            // Show express if 6+
            if (order.qty >= 6) {
                document.getElementById('expressOption').style.display = 'flex';
            }
        }
        
        function updateDelivery() {
            // Could update pricing based on delivery method
        }
        
        function payWith(method) {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!name || !phone) {
                alert('Please enter your name and phone number');
                return;
            }
            
            const key = order.size + '-' + order.qty;
            const linkKey = STRIPE_LINKS[key] || STRIPE_LINKS[order.size + '-1'];
            
            if (method === 'venmo') {
                window.open(`https://venmo.com/${VENMO_USERNAME}?txn=pay&amount=${order.price}&note=PhotoMagnets${order.qty}Ref${phone}`, '_blank');
            } else if (method === 'cashapp') {
                window.open(`https://cash.app/${CASHAPP_TAG}/${order.price}?note=PhotoMagnets${order.qty}`, '_blank');
            } else if (method === 'stripe') {
                window.location.href = linkKey;
            }
        }
        
        init();
    </script>
</body>
</html>
